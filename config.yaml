system:
  name: "Jarvis 360"
  version: "0.1.0"
  mode: "paper"  # paper | live  — NEVER change to live without a full paper trading history

logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR

database:
  url: "sqlite:///jarvis.db"

trading:
  paper_balance: 10000.00         # Starting paper trading balance in USD
  max_position_size_pct: 0.05     # Max 5% of capital in any single trade
  max_memecoin_pct: 0.02          # Max 2% in any single memecoin
  min_confidence_score: 25        # Minimum score (0-100) to execute a trade
  min_agents_consensus: 1         # Minimum agents that must agree before a trade
  max_concurrent_positions: 5     # Never hold more than this many open positions
  stop_loss_pct: -0.08            # Close position at -8% loss (fixed, from entry)
  take_profit_pct: 0.25           # Close position at +25% gain
  trailing_stop_pct: 0.15         # Trail 15% below peak price once position is profitable
  max_hold_hours: 48              # Auto-close any position after 48 hours
  stop_loss_cooldown_minutes: 30  # Don't re-enter a token this soon after it stopped us out (avoids chop whipsaw)

intelligence:
  # GMGN smart money discovery
  gmgn_enabled: true
  gmgn_wallet_limit: 50           # Top N smart money wallets to track
  gmgn_min_wallet_score: 55       # Minimum quality score to generate a signal
  coordinated_buy_threshold: 3    # N wallets buying same token = coordinated signal

  # Birdeye elite traders
  birdeye_enabled: true
  birdeye_min_pnl_usd: 5000       # Only track traders with >$5k daily P&L
  birdeye_top_n: 20               # Top N traders to track from Birdeye

  # Token discovery sources (all active simultaneously)
  discovery_sources:
    - gmgn
    - birdeye
    - dexscreener

  # Wallet quality scoring weights
  wallet_score_weights:
    win_rate: 0.30
    realized_pnl: 0.40
    trade_history: 0.15
    trade_size: 0.15

execution:
  # On-chain execution settings (Phase 7 — live mode only)
  slippage_bps: 50                # 0.5% slippage tolerance on Jupiter/PancakeSwap
  # solana_rpc_url and bnb_rpc_url are built from env vars at runtime:
  #   Solana: https://mainnet.helius-rpc.com/?api-key=<HELIUS_API_KEY>
  #   BNB:    BNB_RPC_URL env var (or https://bsc-dataseed.binance.org/ default)

maintenance:
  data_retention_days: 30         # Delete time-series records older than this

risk:
  daily_loss_limit_pct: 0.05      # Halt trading if daily loss exceeds 5%
  max_drawdown_pct: 0.15          # Circuit breaker triggers at 15% drawdown
  min_liquidity_usd: 25000        # Reject any token with less than $25k liquidity

chains:
  - solana
  - bnb

notifications:
  daily_briefing_hour: 8          # Send daily summary at 8 AM
  enabled: false                  # Set to true once Telegram is configured

agents:
  orchestrator:
    interval_seconds: 30
  research:
    interval_seconds: 300
  whale:
    interval_seconds: 60
  smart_money:
    interval_seconds: 120
  elite_trader:
    interval_seconds: 180
  sentiment:
    interval_seconds: 300
  risk:
    interval_seconds: 30
  vetting:
    interval_seconds: 60
  strategy:
    interval_seconds: 120
  execution:
    interval_seconds: 10
  portfolio:
    interval_seconds: 60
  learning:
    interval_seconds: 3600
  reporting:
    interval_seconds: 86400
  prediction_market:
    interval_seconds: 300
  regime:
    interval_seconds: 300

prediction_markets:
  enabled: true

  crypto_keywords:
    - bitcoin
    - btc
    - ethereum
    - eth
    - solana
    - sol
    - crypto
    - defi
    - nft
    - altcoin
    - memecoin

  macro_keywords:
    - federal reserve
    - fed rate
    - interest rate
    - recession
    - inflation
    - market crash
    - stock market
    - gdp
    - unemployment
    - cpi

  # Safe mode thresholds (probability 0.0–1.0)
  risk_off_threshold: 0.60        # Cautious mode above this
  extreme_risk_threshold: 0.80    # Safe mode above this

  # Significant event detection
  significant_change_pct: 0.10    # Flag if probability changes 10%+ in one tick

  # Confidence score contribution (points added/subtracted)
  max_confidence_bonus: 10
  max_confidence_penalty: 25

  # Safe mode position management
  safe_mode_position_multiplier: 0.50   # 50% of normal in cautious, 25% in safe
  block_memecoins_in_safe_mode: true
